<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog · aestima</title>
    <meta name="description" content="Articoli e approfondimenti di aestima." />
    <link rel="canonical" href="https://aestima.it/blog/index.html" />

    <!-- INCOLLA QUI CSS/header/footer del sito -->

    <style>
      /* Stile minimale di default — sostituibile con il CSS del sito */
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        line-height: 1.5;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 2.5rem 1.25rem;
      }
      h1 {
        font-size: 1.9rem;
        margin: 0 0 1.75rem;
      }
      .post-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      .post-card {
        display: flex;
        gap: 1rem;
        text-decoration: none;
        color: inherit;
        border: 1px solid rgba(128, 128, 128, 0.25);
        border-radius: 12px;
        padding: 1rem;
        transition: border-color 0.2s ease;
      }
      .post-card:hover {
        border-color: rgba(128, 128, 128, 0.55);
      }
      .post-card img {
        width: 128px;
        height: 84px;
        object-fit: cover;
        border-radius: 8px;
        flex: none;
      }
      .post-card h2 {
        font-size: 1.15rem;
        margin: 0 0 0.35rem;
      }
      .post-card time {
        font-size: 0.8rem;
        opacity: 0.7;
      }
      .post-card p {
        margin: 0.4rem 0 0;
        font-size: 0.95rem;
        opacity: 0.85;
      }
      .empty {
        opacity: 0.7;
      }
      @media (max-width: 520px) {
        .post-card {
          flex-direction: column;
        }
        .post-card img {
          width: 100%;
          height: 170px;
        }
      }
    </style>
  </head>
  <body>
    <!-- INCOLLA QUI header del sito (opzionale) -->

    <div class="wrap">
      <h1>Blog</h1>
      <ul class="post-list" id="post-list">
        <li class="empty">Caricamento…</li>
      </ul>
    </div>

    <!-- INCOLLA QUI footer del sito (opzionale) -->

    <script>
      (async function () {
        var list = document.getElementById("post-list");

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function formatDate(d) {
          if (!d) return "";
          var date = new Date(d);
          if (isNaN(date.getTime())) return "";
          return date.toLocaleDateString("it-IT", {
            day: "numeric",
            month: "long",
            year: "numeric",
          });
        }

        try {
          var res = await fetch("/blog/posts.json", { cache: "no-store" });
          var posts = await res.json();

          if (!Array.isArray(posts) || posts.length === 0) {
            list.innerHTML = '<li class="empty">Nessun articolo pubblicato.</li>';
            return;
          }

          posts.sort(function (a, b) {
            return new Date(b.date || 0) - new Date(a.date || 0);
          });

          list.innerHTML = posts
            .map(function (p) {
              var url = p.url || "/blog/" + p.slug + ".html";
              var img = p.image
                ? '<img src="' + encodeURI(p.image) + '" alt="" loading="lazy" />'
                : "";
              var date = formatDate(p.date);
              return (
                '<li><a class="post-card" href="' +
                encodeURI(url) +
                '">' +
                img +
                "<div>" +
                "<h2>" +
                escapeHtml(p.title || "") +
                "</h2>" +
                (date ? "<time>" + date + "</time>" : "") +
                (p.description ? "<p>" + escapeHtml(p.description) + "</p>" : "") +
                "</div></a></li>"
              );
            })
            .join("");
        } catch (e) {
          list.innerHTML =
            '<li class="empty">Impossibile caricare gli articoli.</li>';
        }
      })();
    </script>
  </body>
</html>
